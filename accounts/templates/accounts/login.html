{% extends 'base.html' %}
{% load static %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Giriş Yap</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                    </form>
                    <hr>
                    <p class="text-center">
                        Hesabınız yok mu? <a href="{% url 'accounts:register' %}">Kayıt Ol</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
