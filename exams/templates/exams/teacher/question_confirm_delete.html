{% extends 'base.html' %}

{% block title %}Soru Sil{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3>Soru Sil</h3>
                </div>
                <div class="card-body">
                    <p>{{ question.text|truncatechars:100 }} sorusunu silmek istediğinize emin misiniz?</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Evet, Sil</button>
                        <a href="{% url 'exams:teacher_question_list' question.exam.id %}" class="btn btn-secondary">İptal</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
