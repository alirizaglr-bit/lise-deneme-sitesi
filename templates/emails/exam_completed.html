<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sınav Tamamlandı</title>
</head>
<body>
    <h2>Sınav Tamamlandı</h2>
    <p>Merhaba {{ student.get_full_name }},</p>
    <p><strong>{{ exam.title }}</strong> sınavını başarıyla tamamladınız.</p>
    <p>
        Net: {{ attempt.score|floatformat:2 }}
        (Doğru: {{ attempt.correct_count }}, Yanlış: {{ attempt.wrong_count }}, Boş: {{ attempt.empty_count }})
    </p>
    <p>Detaylı rapor için <a href="{{ report_url }}">tıklayın</a>.</p>
</body>
</html>
