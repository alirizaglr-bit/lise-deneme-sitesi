{% extends 'base.html' %}

{% block title %}Çocuklarım{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Çocuklarım</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Ad Soyad</th>
                <th>E-posta</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for child in children %}
            <tr>
                <td>{{ child.get_full_name }}</td>
                <td>{{ child.email }}</td>
                <td><a href="{% url 'reports:parent_child_detail' child.id %}" class="btn btn-sm btn-primary">Rapor</a></td>
            </tr>
            {% empty %}
            <tr><td colspan="3">Kayıtlı çocuk bulunamadı.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
