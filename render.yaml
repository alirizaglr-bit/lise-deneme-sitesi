# Render Blueprint - Django uygulaması
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lise-deneme-sitesi
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "false"
      # SECRET_KEY: Render Dashboard > Environment'tan ekleyin (güvenlik için)
